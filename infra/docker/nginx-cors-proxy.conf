# Nginx reverse proxy that adds CORS headers for Cloudflare Tunnel access.
#
# Problem: When noVNC is accessed through a Cloudflare Tunnel, the browser
# origin differs from the backend (e.g., https://sim.example.com vs
# localhost:6080). websockify doesn't set CORS headers, so the browser
# blocks both HTTP fetches and WebSocket upgrades.
#
# Solution: Nginx sits between the tunnel and websockify/noVNC, injecting
# the required CORS headers on every response.

server {
    listen 6090;
    server_name _;

    # Allow any origin through the tunnel (the tunnel itself is the auth boundary)
    set $cors_origin "*";

    # ── noVNC static files + websockify API ──────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:6080;

        # CORS headers for normal HTTP requests
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket endpoint (noVNC ↔ websockify) ─────────────────────────────
    location /websockify {
        proxy_pass http://127.0.0.1:6080;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS headers on the upgrade response
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for persistent VNC sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
